name: Build Redmi 13C 5G Kernel (vmlinux)

on:
  workflow_dispatch: # 支持手动点击按钮触发
  push:
    branches:
      - main # 仅监听 main 分支

jobs:
  build:
    name: Build vmlinux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libncurses-dev \
            libelf-dev \
            rsync \
            git \
            python3 \
            zip \
            unzip \
            curl \
            lld \
            llvm \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi

      - name: Download AOSP Clang
        run: |
          # 解决 wget exit code 8：改用 Git 稀疏检出（Sparse Checkout）精准拉取工具链
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          git init
          git remote add origin https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
          git sparse-checkout init --cone
          git sparse-checkout set clang-r450784d
          # Android 源当前主分支可能为 main 或 master，尝试拉取
          git fetch --depth=1 origin main || git fetch --depth=1 origin master
          git checkout FETCH_HEAD

      - name: Build vmlinux
        run: |
          # 环境变量设置：注意这里的 PATH 增加了一层 clang-r450784d 目录
          export PATH=$GITHUB_WORKSPACE/clang/clang-r450784d/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          mkdir -p out

          echo "================ 开始配置内核 ================" | tee config.log
          # 查找配置文件并生成 .config，同时保存日志
          if [ -f "arch/arm64/configs/air_defconfig" ]; then
            make O=out air_defconfig 2>&1 | tee -a config.log
          elif [ -f "arch/arm64/configs/vendor/air_user_defconfig" ]; then
            make O=out vendor/air_user_defconfig 2>&1 | tee -a config.log
          elif [ -f "arch/arm64/configs/vendor/air_defconfig" ]; then
            make O=out vendor/air_defconfig 2>&1 | tee -a config.log
          else
            echo "未在默认路径找到 air 配置文件，自动搜索匹配..." | tee -a config.log
            DEFCONFIG_PATH=$(find arch/arm64/configs/ -name "*air*" | head -n 1)
            DEFCONFIG_NAME=$(echo $DEFCONFIG_PATH | sed 's|arch/arm64/configs/||')
            echo "正在使用配置文件: $DEFCONFIG_NAME" | tee -a config.log
            make O=out $DEFCONFIG_NAME 2>&1 | tee -a config.log
          fi

          echo "================ 开始编译 vmlinux ================" | tee build.log
          # 编译未压缩的内核文件 vmlinux
          make -j$(nproc --all) O=out vmlinux LLVM=1 LLVM_IAS=1 2>&1 | tee -a build.log

      - name: Upload Build Log
        if: always() # 确保报错时也能保存日志
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-logs
          path: |
            config.log
            build.log

      - name: Upload vmlinux
        if: success() # 只有编译成功才上传产物
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-redmi13c5g
          path: out/vmlinux
