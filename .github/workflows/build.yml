name: Build vmlinux (air)

on:
  workflow_dispatch:      # 手动点按钮触发
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git libssl-dev libelf-dev python3 python3-pip \
            zip unzip lz4 rsync device-tree-compiler

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: air-kernel

      # 如果仓库根目录本身带 build.sh，优先用它，跳过下面手写的 clang/gcc 下载和 make 步骤
      # - name: Build with repo script
      #   run: bash build.sh

      - name: Download Clang toolchain
        run: |
          mkdir -p toolchain/clang
          curl -L "$(curl -s https://api.github.com/repos/ZyCromerZ/Clang/releases/latest | grep browser_download_url | cut -d '"' -f4)" -o clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/clang

      - name: Download GCC (arm/arm64) for CROSS_COMPILE
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain/gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 toolchain/gcc32

      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:${GITHUB_WORKSPACE}/toolchain/gcc64/bin:${GITHUB_WORKSPACE}/toolchain/gcc32/bin:${PATH}"
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          mkdir -p out
          make O=out ARCH=arm64 air_defconfig   # ← 改成你仓库里实际的 defconfig 文件名
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="ccache clang" \
            CROSS_COMPILE=${CROSS_COMPILE} \
            CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
            CLANG_TRIPLE=${CLANG_TRIPLE} 2>&1 | tee build.log

      - name: Check output
        run: |
          ls -la out/vmlinux
          file out/vmlinux

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-air
          path: |
            out/vmlinux
            out/arch/arm64/boot/Image*
            build.log
