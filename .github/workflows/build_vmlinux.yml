name: 编译 vmlinux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # 用老版本兼容性更好
    strategy:
      fail-fast: false
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc \
          flex \
          bison \
          bc \
          libelf-dev \
          libssl-dev \
          git \
          cpio \
          python3 \
          rsync

    - name: 探测可用的配置文件
      run: |
        echo "========== 架构目录结构 =========="
        ls -la arch/ 2>/dev/null || echo "没有 arch 目录"
        echo ""
        echo "========== 所有 defconfig 文件 =========="
        find . -name "*defconfig*" -type f 2>/dev/null | head -30
        echo ""
        echo "========== x86 配置 =========="
        ls arch/x86/configs/ 2>/dev/null || echo "没有 arch/x86/configs"
        echo ""
        echo "========== x86_64 配置 =========="  
        ls arch/x86_64/configs/ 2>/dev/null || echo "没有 arch/x86_64"
        echo ""
        echo "========== 根目录 Makefile 前50行 =========="
        head -50 Makefile 2>/dev/null || echo "没有 Makefile"

    - name: 设置架构并编译
      run: |
        export ARCH=x86_64
        # 这个仓库可能是 x86_64 架构
        # 先尝试 x86_64_defconfig
        if [ -f arch/x86/configs/x86_64_defconfig ]; then
          echo "使用 x86_64_defconfig"
          make x86_64_defconfig
        elif [ -f arch/x86/configs/i386_defconfig ]; then
          echo "使用 i386_defconfig"
          make i386_defconfig  
        else
          # 列出所有 defconfig，用第一个
          FIRST_CONFIG=$(find arch/x86/configs/ -name "*defconfig" -type f 2>/dev/null | head -1)
          if [ -n "$FIRST_CONFIG" ]; then
            CONFIG_NAME=$(basename "$FIRST_CONFIG")
            echo "尝试使用: $CONFIG_NAME"
            make "$CONFIG_NAME"
          else
            echo "❌ 找不到任何 defconfig 文件"
            echo "查看全部文件结构："
            ls -R arch/ | head -100
            exit 1
          fi
        fi
        
        echo "========== 开始编译 =========="
        make -j$(nproc) 2>&1 | tee build.log
        echo "编译退出码: $?"

    - name: 检查编译产物
      run: |
        echo "========== vmlinux 状态 =========="
        if [ -f vmlinux ]; then
          ls -lh vmlinux
          file vmlinux
          echo "✅ vmlinux 编译成功！"
        else
          echo "❌ vmlinux 不存在"
          echo ""
          echo "查找可能的产物："
          find . -name "vmlinux*" -type f 2>/dev/null
          echo ""
          echo "编译日志最后50行："
          tail -50 build.log
        fi

    - name: 上传 vmlinux
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vmlinux-android-kernel
        path: |
          vmlinux
          build.log
          .config

    - name: 即使失败也上传日志
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-failed
        path: build.log
